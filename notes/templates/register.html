{% extends 'base.html' %}

{% block title %}
Register
{% endblock %}

{% block content %}

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-5">

            <div class="card shadow">

                <div class="card-body">

                    <h2 class="text-center mb-4">
                        Register
                    </h2>

                    <form method="POST">

                        {% csrf_token %}

                        {{ form.non_field_errors }}

{{ form.as_p }}

                        <button class="btn btn-primary w-100">
                            Register
                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
