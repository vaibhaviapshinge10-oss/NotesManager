{% extends 'base.html' %}

{% block title %}
Edit Note
{% endblock %}

{% block content %}

<div class="container mt-5">

    <div class="card shadow">

        <div class="card-body">

            <h2>Edit Note</h2>

            <form method="POST">

                {% csrf_token %}

                {{ form.as_p }}

                <button class="btn btn-warning">
                    Update Note
                </button>

            </form>

        </div>

    </div>

</div>

{% endblock %}
